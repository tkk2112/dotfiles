default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: '\.age$'
      - id: trailing-whitespace
        exclude: '\.age$'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.age$'
      - id: pretty-format-json
        args:
          - --indent
          - "2"
          - --no-sort-keys

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        stages: [pre-push]

  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        types: [file]
        files: '(^|/)(\.talismanrc|\.yamlfmt|.*\.ya?ml)$'
        exclude: '\.tmpl$'

  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.5.2
    hooks:
      - id: stylua-github

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        args: [--check]
        exclude: \.tmpl$

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-d]
        exclude: ^home/dot_p10k\.zsh$|\.tmpl$

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: [--check]
        additional_dependencies:
          - mdformat-gfm

  - repo: https://github.com/thoughtworks/talisman
    rev: 'v1.37.0'
    hooks:
      - id: talisman-commit

  - repo: local
    hooks:
      - id: shell-syntax
        name: shell syntax
        language: system
        entry: sh -c 'for file in setup.sh scripts/*.sh; do sh -n "$file" || exit 1; done'
        files: '(^setup\.sh$|^scripts/.*\.sh$)'
        pass_filenames: false

      - id: chezmoi-verify-root
        name: chezmoi source root
        language: system
        entry: sh -c 'test "$(cat .chezmoiroot)" = home'
        files: '^\.chezmoiroot$'
        pass_filenames: false

      - id: chezmoi-dry-run
        name: chezmoi dry-run apply
        language: system
        entry: sh -c 'chezmoi --source "$PWD" --destination "$(mktemp -d)" apply --dry-run --exclude scripts'
        pass_filenames: false
        stages: [pre-push]
