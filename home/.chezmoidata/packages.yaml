---
# Package catalog for the chezmoi package bootstrap script.
#

packages:
  apt:
    ppas:
      - ppa:neovim-ppa/unstable

  dnf:
    copr:
      - atim/gping
      - dejan/lazygit
      - gsauthof/dracut-sshd
      - kylegospo/grub-btrfs

  casks:
    - name: whatcable
      group: development
      tap: darrylmorley/whatcable
      cask: whatcable

  uv_tools:
    - name: cmake-language-server
      group: development
      package: cmake-language-server
      command: cmake-language-server
      with:
        - pygls==1.3.1
    - name: stylua
      group: development
      package: git+https://github.com/johnnymorganz/stylua@v2.5.2

  # Rules:
  # - Packages without a group belong to the always-installed core set.
  # - Packages with a group are selected when the matching profile is enabled.
  # - managers omitted means: brew, apt, dnf, and pacman all use the same package name.
  # - managers restricts a package to specific package managers.
  # - names overrides package names where managers disagree.
  catalog:
    # --------------------------------------------------------------------------
    # Core: safe default CLI foundation (not a selectable profile).
    # --------------------------------------------------------------------------
    - name: bat
    - name: btop
    - name: direnv
    - name: fzf
    - name: git
    - name: git-lfs
    - name: jq
    - name: lsd
    - name: neovim
    - name: ripgrep
    - name: shellcheck
    - name: shfmt
    - name: tmux
    - name: tree
    - name: yamllint
    - name: zsh

    - name: age
      managers: [apt, dnf, pacman, brew]

    - name: build-essential
      managers: [apt]

    - name: ca-certificates
      managers: [apt, dnf, pacman]

    - name: curl
      managers: [apt, dnf, pacman]

    - name: fontconfig
      managers: [apt, dnf, pacman]

    - name: git-gui
      managers: [brew, apt, dnf]

    - name: tree-sitter-cli
      managers: [brew, dnf, pacman]

    - name: rsync
      managers: [apt, dnf, pacman]

    - name: unzip
      managers: [apt, dnf, pacman, brew]

    - name: argcomplete
      managers: [apt, dnf, brew]
      names:
        apt: python3-argcomplete
        dnf: python3-argcomplete
        brew: python-argcomplete

    # --------------------------------------------------------------------------
    # Development: build tools, language tooling, LSPs, git helpers.
    # --------------------------------------------------------------------------
    - name: ast-grep
      group: development
      managers: [brew, pacman]

    - name: base-devel
      group: development
      managers: [pacman]

    - name: build-essential
      group: development
      managers: [apt]

    - name: clang
      group: development
      managers: [apt, dnf, pacman]

    - name: cmake
      group: development

    - name: code-minimap
      group: development
      managers: [brew]

    - name: git-delta
      group: development
      managers: [brew, dnf, pacman]

    - name: lazygit
      group: development
      managers: [brew, dnf, pacman]

    - name: llvm
      group: development

    - name: meson
      group: development

    - name: ninja
      group: development
      managers: [apt, dnf, pacman]
      names:
        apt: ninja-build
        dnf: ninja-build
        pacman: ninja

    - name: pkg-config
      group: development
      managers: [apt]

    - name: python-lsp-server
      group: development
      managers: [brew, pacman]

    - name: uv
      group: development
      managers: [brew, dnf, pacman]

    - name: zig
      group: development
      managers: [brew, dnf, pacman]

    - name: zls
      group: development
      managers: [brew, pacman]

    - name: gdb
      group: development
      managers: [apt, dnf, pacman, brew]

    - name: cgdb
      group: development
      managers: [apt, dnf, pacman, brew]

    - name: rr
      group: development
      managers: [apt, dnf]

    - name: strace
      group: development
      managers: [apt, dnf, pacman]

    - name: ltrace
      group: development
      managers: [apt, dnf, pacman]

    - name: gnupg
      group: development
      names:
        apt: gnupg
        dnf: gnupg2
        pacman: gnupg
        brew: gnupg

    # --------------------------------------------------------------------------
    # Workstation: interactive local-machine tools.
    # --------------------------------------------------------------------------
    - name: duf
      group: workstation
      managers: [brew, dnf, pacman]

    - name: gping
      group: workstation
      managers: [brew, dnf, pacman]

    - name: htop
      group: workstation
      managers: [apt, dnf, pacman]

    - name: icdiff
      group: workstation
      managers: [apt, brew]

    - name: imagemagick
      group: workstation
      names:
        dnf: ImageMagick

    - name: nmap
      group: workstation

    - name: nvtop
      group: workstation
      managers: [apt, dnf, pacman]

    - name: p7zip
      group: workstation
      names:
        apt: p7zip-full

    - name: the_silver_searcher
      group: workstation
      names:
        apt: silversearcher-ag

    - name: tio
      group: workstation
      managers: [apt, dnf]

    - name: yt-dlp
      group: workstation

    - name: pinentry
      group: workstation
      names:
        apt: pinentry-curses
        dnf: pinentry
        pacman: pinentry
        brew: pinentry-mac

    - name: pcsc-lite
      group: workstation
      managers: [apt, dnf, pacman]
      names:
        apt: pcscd
        dnf: pcsc-lite
        pacman: pcsclite

    - name: pcsc-ccid
      group: workstation
      managers: [apt, dnf, pacman]
      names:
        apt: libccid
        dnf: pcsc-lite-ccid
        pacman: ccid

    - name: opensc
      group: workstation
      managers: [apt, dnf, pacman, brew]

    - name: yubikey-manager
      group: workstation
      managers: [apt, dnf, pacman, brew]
      names:
        apt: yubikey-manager
        dnf: yubikey-manager
        pacman: yubikey-manager
        brew: ykman

    # --------------------------------------------------------------------------
    # Server: service and remote-administration tooling.
    # --------------------------------------------------------------------------
    - name: openssh
      group: server
      managers: [apt, dnf, pacman]
      names:
        apt: openssh-server
        dnf: openssh-server
        pacman: openssh

    - name: moreutils
      group: server
      managers: [apt, dnf]

    - name: debian-goodies
      group: server
      managers: [apt]

    - name: dnsutils
      group: server
      managers: [apt]

    - name: bind-utils
      group: server
      managers: [dnf]

    - name: dnf-utils
      group: server
      managers: [dnf]

    - name: dracut-sshd
      group: server
      managers: [dnf]

    - name: perl
      group: server
      managers: [dnf]

    - name: tldr
      group: server
      managers: [dnf]

    - name: which
      group: server
      managers: [dnf]

    # --------------------------------------------------------------------------
    # macOS/Homebrew-only helpers.
    # --------------------------------------------------------------------------
    - name: coreutils
      group: workstation
      managers: [brew]

    - name: zsh-completions
      group: workstation
      managers: [brew]

    # --------------------------------------------------------------------------
    # Gaming: currently Fedora-focused.
    # --------------------------------------------------------------------------
    - name: steam
      group: gaming
      managers: [dnf]

    - name: mangohud
      group: gaming
      managers: [dnf]

    - name: goverlay
      group: gaming
      managers: [dnf]

    - name: gamemode
      group: gaming
      managers: [dnf]
