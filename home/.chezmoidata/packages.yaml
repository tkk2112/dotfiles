---
# Package catalog for the chezmoi package bootstrap script.
#
# Rules:
# - group: base is always installed.
# - group: development/workstation/server/gaming are installed only when that
#   profile is enabled.
# - managers omitted means: brew, apt, dnf, and pacman all use the same package name.
# - managers restricts a package to specific package managers.
# - names overrides package names where managers disagree.

packages:
  dnf:
    copr:
      - atim/gping
      - dejan/lazygit
      - gsauthof/dracut-sshd
      - kylegospo/grub-btrfs

  casks:
    - name: whatcable
      group: development
      tap: darrylmorley/whatcable
      cask: whatcable

  uv_tools:
    - name: cmake-language-server
      group: development
      package: cmake-language-server
      command: cmake-language-server
      with:
        - pygls==1.3.1

  catalog:
    # --------------------------------------------------------------------------
    # Base: safe default CLI foundation.
    # --------------------------------------------------------------------------
    - name: bat
    - name: btop
    - name: direnv
    - name: fzf
    - name: git
    - name: git-lfs
    - name: jq
    - name: lsd
    - name: neovim
    - name: ripgrep
    - name: shellcheck
    - name: shfmt
    - name: tmux
    - name: tree
    - name: yamllint
    - name: zsh

    - name: ca-certificates
      managers: [apt, dnf, pacman]

    - name: curl
      managers: [apt, dnf, pacman]

    - name: fontconfig
      managers: [apt, dnf, pacman]

    - name: git-gui
      managers: [brew, apt, dnf]

    - name: rsync
      managers: [apt, dnf, pacman]

    - name: unzip
      managers: [apt, dnf, pacman]

    - name: argcomplete
      managers: [apt, dnf, brew]
      names:
        apt: python3-argcomplete
        dnf: python3-argcomplete
        brew: python-argcomplete

    # --------------------------------------------------------------------------
    # Development: build tools, language tooling, LSPs, git helpers.
    # --------------------------------------------------------------------------
    - name: ast-grep
      group: development
      managers: [brew, pacman]

    - name: base-devel
      group: development
      managers: [pacman]

    - name: build-essential
      group: development
      managers: [apt]

    - name: clang
      group: development
      managers: [apt, dnf, pacman]

    - name: cmake
      group: development

    - name: code-minimap
      group: development
      managers: [brew]

    - name: git-delta
      group: development
      managers: [brew, dnf, pacman]

    - name: golang
      group: development
      managers: [apt, dnf, pacman]
      names:
        apt: golang
        dnf: golang
        pacman: go

    - name: lazygit
      group: development
      managers: [brew, dnf, pacman]

    - name: llvm
      group: development

    - name: meson
      group: development

    - name: ninja
      group: development
      managers: [apt, dnf, pacman]
      names:
        apt: ninja-build
        dnf: ninja-build
        pacman: ninja

    - name: pkg-config
      group: development
      managers: [apt]

    - name: python-lsp-server
      group: development
      managers: [brew, pacman]

    - name: rust
      group: development
      managers: [brew, dnf, pacman]

    - name: uv
      group: development
      managers: [brew, dnf, pacman]

    - name: zig
      group: development
      managers: [brew, dnf, pacman]

    - name: zls
      group: development
      managers: [brew, pacman]

    # --------------------------------------------------------------------------
    # Workstation: interactive local-machine tools.
    # --------------------------------------------------------------------------
    - name: duf
      group: workstation
      managers: [brew, dnf, pacman]

    - name: gping
      group: workstation
      managers: [brew, dnf, pacman]

    - name: htop
      group: workstation
      managers: [apt, dnf, pacman]

    - name: icdiff
      group: workstation
      managers: [apt, brew]

    - name: imagemagick
      group: workstation
      names:
        dnf: ImageMagick

    - name: nmap
      group: workstation

    - name: nvtop
      group: workstation
      managers: [apt, dnf, pacman]

    - name: p7zip
      group: workstation
      names:
        apt: p7zip-full

    - name: the_silver_searcher
      group: workstation
      names:
        apt: silversearcher-ag

    - name: tio
      group: workstation
      managers: [apt, dnf]

    - name: yt-dlp
      group: workstation

    # --------------------------------------------------------------------------
    # Server/headless: server-friendly tooling.
    # --------------------------------------------------------------------------
    - name: openssh
      group: server
      managers: [apt, dnf, pacman]
      names:
        apt: openssh-server
        dnf: openssh-server
        pacman: openssh

    - name: moreutils
      group: server
      managers: [apt, dnf]

    - name: debian-goodies
      group: server
      managers: [apt]

    - name: dnsutils
      group: server
      managers: [apt]

    - name: bind-utils
      group: server
      managers: [dnf]

    - name: dnf-utils
      group: server
      managers: [dnf]

    - name: dracut-sshd
      group: server
      managers: [dnf]

    - name: perl
      group: server
      managers: [dnf]

    - name: tldr
      group: server
      managers: [dnf]

    - name: which
      group: server
      managers: [dnf]

    # --------------------------------------------------------------------------
    # macOS/Homebrew-only helpers.
    # --------------------------------------------------------------------------
    - name: coreutils
      group: workstation
      managers: [brew]

    - name: zsh-completions
      group: workstation
      managers: [brew]

    # --------------------------------------------------------------------------
    # Gaming: currently Fedora-focused.
    # --------------------------------------------------------------------------
    - name: steam
      group: gaming
      managers: [dnf]

    - name: mangohud
      group: gaming
      managers: [dnf]

    - name: goverlay
      group: gaming
      managers: [dnf]

    - name: gamemode
      group: gaming
      managers: [dnf]
