# =======================
# GLOBAL DEFAULTS
# =======================

Host *
  # Security & UX
  HashKnownHosts yes
  StrictHostKeyChecking ask
  UpdateHostKeys yes
  VerifyHostKeyDNS yes

  # Auth & agent hygiene
  AddKeysToAgent yes
  ForwardAgent no
  ForwardX11 no
  IdentitiesOnly yes
  PreferredAuthentications publickey,keyboard-interactive

  # Keepalives
  ForwardX11Timeout 0
  ServerAliveInterval 120
  TCPKeepAlive yes

  LogLevel ERROR
