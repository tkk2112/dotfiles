---
name: .dotfiles main

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    name: chezmoi check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check shell syntax
        run: |
          set -eu
          sh -n setup.sh
          find home/.chezmoiscripts -type f -name '*.sh' -print -exec sh -n {} \;

      - name: Check chezmoi source root
        run: test "$(cat .chezmoiroot)" = home

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Validate chezmoi source state
        run: |
          set -eu
          export PATH="$HOME/.local/bin:$PATH"

          dest="$(mktemp -d)"

          chezmoi \
            --source "$PWD" \
            --destination "$dest" \
            init \
            --promptDefaults

          chezmoi \
            --source "$PWD" \
            --destination "$dest" \
            diff \
            --exclude scripts

      - name: Dry-run apply
        run: |
          set -eu
          export PATH="$HOME/.local/bin:$PATH"

          dest="$(mktemp -d)"

          chezmoi \
            --source "$PWD" \
            --destination "$dest" \
            apply \
            --dry-run \
            --verbose \
            --exclude scripts

  url-check:
    name: setup.sh URL check
    runs-on: ubuntu-latest
    needs: [check]

    steps:
      - name: Verify short URL points to latest setup.sh
        run: |
          set -eu

          GITHUB_URL="https://raw.githubusercontent.com/tkk2112/dotfiles/refs/heads/main/setup.sh"
          CUSTOM_URL="https://link.m04r.space/dotfiles"

          GITHUB_CHECKSUM="$(curl -Ls "$GITHUB_URL" | sha256sum | cut -d' ' -f1)"
          CUSTOM_CHECKSUM="$(curl -Lsk "$CUSTOM_URL" | sha256sum | cut -d' ' -f1)"

          echo "GitHub ($GITHUB_URL): $GITHUB_CHECKSUM"
          echo "Custom ($CUSTOM_URL): $CUSTOM_CHECKSUM"

          if [ "$GITHUB_CHECKSUM" != "$CUSTOM_CHECKSUM" ]; then
            echo "Error: Custom URL content checksum differs from GitHub URL content checksum"
            exit 1
          fi
