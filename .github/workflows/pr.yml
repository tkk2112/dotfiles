---
name: .dotfiles PR

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:

jobs:
  check:
    name: pre-commit
    runs-on: ubuntu-latest
    env:
      DOTFILES_CI: 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-5|${{ runner.os }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: uv tool run pre-commit run --all-files

  install-linux:
    needs: check
    name: install on ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu:24.04
          - ubuntu:latest
          - debian:13
          - debian:sid
          - fedora:latest
          - archlinux:latest
          - cachyos/cachyos:latest

    container:
      image: ${{ matrix.image }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run dotfiles install test
        env:
          DOTFILES_CI: 'true'
          DOTFILES_LOCATION: ${{ github.workspace }}
        run: ./scripts/ci-install.sh

  install-macos:
    needs: check
    name: install on macos:latest
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run dotfiles install test
        env:
          DOTFILES_CI: 'true'
          DOTFILES_LOCATION: ${{ github.workspace }}
        run: ./scripts/ci-install.sh

  test:
    name: test
    runs-on: ubuntu-latest
    needs:
      - check
      - install-linux
      - install-macos
    if: always()

    steps:
      - name: Check required jobs
        run: |
          set -eu

          check_result='${{ needs.check.result }}'
          install_linux_result='${{ needs.install-linux.result }}'
          install_macos_result='${{ needs.install-macos.result }}'

          printf 'check: %s\n' "$check_result"
          printf 'install-linux: %s\n' "$install_linux_result"
          printf 'install-macos: %s\n' "$install_macos_result"

          test "$check_result" = "success"
          test "$install_linux_result" = "success"
          test "$install_macos_result" = "success"
