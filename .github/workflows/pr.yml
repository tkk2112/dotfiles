---
name: .dotfiles PR

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:

jobs:
  check:
    name: pre-commit
    runs-on: ubuntu-latest
    env:
      DOTFILES_CI: 'true'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1
        with:
          enable-cache: true

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-5|${{ runner.os }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: uv tool run pre-commit run --all-files

  install-linux:
    needs: check
    name: install on ${{ matrix.image }} / ${{ matrix.profiles }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu/Debian: normal workstation and server/headless coverage.
          - image: ubuntu:24.04
            profiles: base,workstation,development,owned
          - image: ubuntu:latest
            profiles: base,workstation,development,owned
          - image: debian:13
            profiles: base,headless,server,owned
          - image: debian:sid
            profiles: base,development

          # Fedora: owned workstation, server, and gaming coverage.
          - image: fedora:latest
            profiles: base,workstation,development,owned
          - image: fedora:latest
            profiles: base,headless,server,owned
          - image: fedora:latest
            profiles: base,workstation,development,gaming,server,owned

          # Arch/CachyOS: rolling workstation/development coverage.
          - image: archlinux:latest
            profiles: base,workstation,development,owned
          - image: cachyos/cachyos:latest
            profiles: base,workstation,development,owned

    container:
      image: ${{ matrix.image }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run dotfiles install test
        env:
          DOTFILES_CI: 'true'
          DOTFILES_LOCATION: ${{ github.workspace }}
          DOTFILES_PROFILES: ${{ matrix.profiles }}
        run: ./scripts/ci-install.sh

  install-macos:
    needs: check
    name: install on macos:latest / base,workstation,development,owned
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run dotfiles install test
        env:
          DOTFILES_CI: 'true'
          DOTFILES_LOCATION: ${{ github.workspace }}
          DOTFILES_PROFILES: base,workstation,development,owned
        run: ./scripts/ci-install.sh

  test:
    name: test
    runs-on: ubuntu-latest
    needs:
      - check
      - install-linux
      - install-macos
    if: always()

    steps:
      - name: Check required jobs
        run: |
          set -eu

          check_result='${{ needs.check.result }}'
          install_linux_result='${{ needs.install-linux.result }}'
          install_macos_result='${{ needs.install-macos.result }}'

          printf 'check: %s\n' "$check_result"
          printf 'install-linux: %s\n' "$install_linux_result"
          printf 'install-macos: %s\n' "$install_macos_result"

          test "$check_result" = "success"
          test "$install_linux_result" = "success"
          test "$install_macos_result" = "success"
