---
name: .dotfiles PR

# yamllint disable-line rule:truthy
on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: chezmoi check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check shell syntax
        run: |
          set -eu
          sh -n setup.sh
          find home/.chezmoiscripts -type f -name '*.sh' -print -exec sh -n {} \;

      - name: Check chezmoi source root
        run: test "$(cat .chezmoiroot)" = home

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Validate chezmoi source state
        run: |
          set -eu
          export PATH="$HOME/.local/bin:$PATH"

          dest="$(mktemp -d)"

          chezmoi \
            --source "$PWD" \
            --destination "$dest" \
            init \
            --promptDefaults

          chezmoi \
            --source "$PWD" \
            --destination "$dest" \
            diff \
            --exclude scripts

      - name: Dry-run apply
        run: |
          set -eu
          export PATH="$HOME/.local/bin:$PATH"

          dest="$(mktemp -d)"

          chezmoi \
            --source "$PWD" \
            --destination "$dest" \
            apply \
            --dry-run \
            --verbose \
            --exclude scripts
